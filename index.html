<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        background: #05070f;
        color: #f5f3ef;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      #root {
        min-height: 100vh;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="/logo.png" as="image" type="image/png" fetchpriority="high" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Sora:wght@600;700&display=swap"
    />
    <link rel="icon" href="/logo-og.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="description"
      content="Vaali Foods — India's premium agricultural commodities exporter. 150+ years legacy. Farmer-direct Rice, Pulses, Neem Oil & Maize. Basmati rice exporter, laboratory-tested quality, global logistics."
    />
    <meta
      name="keywords"
      content="Rice Exporter India, Basmati Rice Exporter, Pulses Exporter India, Neem Oil Exporter, High-Azadirachtin Neem Oil, Maize Exporter, Farmer Direct Procurement, Agricultural Commodities Export"
    />
    <meta name="author" content="Vaali Foods" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://foods.vaaliadvisory.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://foods.vaaliadvisory.com/" />
    <meta property="og:title" content="Vaali Foods | Agricultural Commodities Export" />
    <meta
      property="og:description"
      content="From Farmers to Global Markets. 150+ years of trading excellence. Direct procurement of Rice, Pulses, Neem Oil & Maize with full traceability."
    />
    <meta property="og:image" content="https://foods.vaaliadvisory.com/logo-og.png" />
    <meta property="og:site_name" content="Vaali Foods" />
    <meta property="og:locale" content="en_IN" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vaali Foods | Agricultural Commodities Export" />
    <meta
      name="twitter:description"
      content="Premium Rice, Pulses, Neem Oil & Maize — farmer-direct sourcing and global export execution."
    />
    <meta name="twitter:image" content="https://foods.vaaliadvisory.com/logo-og.png" />

    <title>Vaali Foods | Rice, Pulses & Agricultural Commodities Export India</title>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Vaali Foods",
        "url": "https://foods.vaaliadvisory.com",
        "logo": "https://foods.vaaliadvisory.com/logo-og.png",
        "description": "Indian agricultural commodities export company specializing in Rice, Pulses, Neem Oil and Maize with farmer-direct procurement.",
        "slogan": "From Farmers to Global Markets",
        "areaServed": ["Middle East", "Asia", "Africa", "Europe"],
        "knowsAbout": [
          "Basmati Rice Export",
          "Pulses Export",
          "High-Azadirachtin Neem Oil Export",
          "Maize Export",
          "Farmer Direct Procurement"
        ],
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Agricultural Commodities",
          "itemListElement": [
            { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Rice" } },
            { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Pulses" } },
            { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "High-Azadirachtin Neem Oil" } },
            { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Maize" } }
          ]
        }
      }
    </script>
  </head>
  <body>
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
